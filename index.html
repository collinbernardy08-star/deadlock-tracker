<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deadlock Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090d;
      --surface: #0d1117;
      --surface2: #111822;
      --border: #1c2733;
      --accent: #e8a020;
      --accent2: #3ecfcf;
      --red: #e05050;
      --green: #50e090;
      --text: #c0d0e0;
      --muted: #3a5060;
      --white: #eef4f8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(62,207,207,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(62,207,207,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, rgba(232,160,32,0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }

    nav {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .nav-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }

    .nav-btn:hover, .nav-btn.active {
      background: rgba(62,207,207,0.08);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ── SEARCH ── */
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1rem 2rem;
    }

    .search-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .search-title span { color: var(--accent); }

    .search-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    .search-box {
      display: flex;
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    .search-box input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      font-size: 1rem;
      padding: 0.85rem 1.25rem;
      outline: none;
      transition: border-color 0.2s;
      clip-path: polygon(10px 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .search-box input:focus { border-color: var(--accent2); }

    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 1.5rem;
      cursor: pointer;
      transition: background 0.2s;
      clip-path: polygon(0% 0%, calc(100% - 10px) 0%, 100% 100%, 0% 100%);
      white-space: nowrap;
    }

    .search-box button:hover { background: #f0b030; }

    .search-error {
      margin-top: 1rem;
      color: var(--red);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    /* ── PLAYER PROFILE ── */
    .profile-header {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      background: var(--surface2);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--white);
    }

    .profile-id {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1.25rem 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
    }

    .stat-value.good { color: var(--green); }
    .stat-value.bad { color: var(--red); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.accent2 { color: var(--accent2); }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::before { content: '//'; color: var(--accent2); }

    /* ── MATCH LIST ── */
    .match-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); }

    .match-row {
      background: var(--surface);
      display: grid;
      grid-template-columns: 80px 1fr 1fr 1fr 1fr 120px;
      align-items: center;
      padding: 0.75rem 1.25rem;
      gap: 1rem;
      transition: background 0.15s;
    }

    .match-row:hover { background: var(--surface2); }

    .match-result {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .match-result.win { color: var(--green); }
    .match-result.loss { color: var(--red); }

    .match-hero {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 600;
    }

    .match-kda {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
    }

    .match-stat {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .match-duration {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }

    .match-header {
      background: var(--bg);
      display: grid;
      grid-template-columns: 80px 1fr 1fr 1fr 1fr 120px;
      padding: 0.5rem 1.25rem;
      gap: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    /* ── HEROES PAGE ── */
    .heroes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .hero-card {
      background: var(--surface);
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      cursor: default;
      transition: transform 0.2s;
    }

    .hero-card:hover { transform: scale(1.04); z-index: 5; }

    .hero-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(0.75) brightness(0.8);
      transition: filter 0.3s;
    }

    .hero-card:hover img { filter: saturate(1) brightness(1); }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7,9,13,0.95) 0%, transparent 60%);
    }

    .hero-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.6rem;
    }

    .hero-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--white);
    }

    .hero-winrate {
      font-size: 0.7rem;
      margin-top: 2px;
    }

    /* ── LEADERBOARD ── */
    .lb-row {
      background: var(--surface);
      display: grid;
      grid-template-columns: 48px 1fr 120px 120px 120px;
      align-items: center;
      padding: 0.75rem 1.25rem;
      gap: 1rem;
      transition: background 0.15s;
    }

    .lb-row:hover { background: var(--surface2); }

    .lb-rank {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }

    .lb-rank.top { color: var(--accent); }

    .lb-name {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-stat {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent2);
      text-align: right;
    }

    .lb-header {
      background: var(--bg);
      display: grid;
      grid-template-columns: 48px 1fr 120px 120px 120px;
      padding: 0.5rem 1.25rem;
      gap: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .region-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1rem;
    }

    .region-tab {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .region-tab:hover, .region-tab.active {
      background: rgba(232,160,32,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── LOADING / ERROR ── */
    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 300px; gap: 1rem;
    }

    .loading-bar {
      width: 200px; height: 2px;
      background: var(--border);
      position: relative; overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: sweep 1.2s ease-in-out infinite;
    }

    @keyframes sweep { 0% { left: -100%; } 100% { left: 100%; } }

    .loading-text {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .error-msg {
      text-align: center;
      padding: 2rem;
      color: var(--red);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>

<header>
  <div class="logo">Dead<span>lock</span> Tracker</div>
  <nav>
    <button class="nav-btn active" onclick="showPage('search')">Spieler</button>
    <button class="nav-btn" onclick="showPage('heroes')">Heroes</button>
    <button class="nav-btn" onclick="showPage('leaderboard')">Leaderboard</button>
  </nav>
</header>

<main>

  <!-- ── SEARCH / PLAYER PAGE ── -->
  <div class="page active" id="page-search">
    <div class="search-section" id="searchSection">
      <div class="search-title">Spieler <span>suchen</span></div>
      <div class="search-subtitle">// Steam Vanity Name eingeben</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="z.B. gaben" onkeydown="if(event.key==='Enter')searchPlayer()" />
        <button onclick="searchPlayer()">Suchen</button>
      </div>
      <div class="search-error" id="searchError"></div>
    </div>

    <div id="playerSection" style="display:none;"></div>
  </div>

  <!-- ── HEROES PAGE ── -->
  <div class="page" id="page-heroes">
    <div class="section-title">Hero Übersicht</div>
    <div id="heroesContent"><div class="loading"><div class="loading-bar"></div><div class="loading-text">Laden...</div></div></div>
  </div>

  <!-- ── LEADERBOARD PAGE ── -->
  <div class="page" id="page-leaderboard">
    <div class="section-title">Leaderboard</div>
    <div class="region-tabs">
      <button class="region-tab active" onclick="loadLeaderboard('Europe', this)">Europa</button>
      <button class="region-tab" onclick="loadLeaderboard('NAmerica', this)">Nordamerika</button>
      <button class="region-tab" onclick="loadLeaderboard('SAmerica', this)">Südamerika</button>
      <button class="region-tab" onclick="loadLeaderboard('Asia', this)">Asien</button>
      <button class="region-tab" onclick="loadLeaderboard('Oceania', this)">Ozeanien</button>
    </div>
    <div id="leaderboardContent"><div class="loading"><div class="loading-bar"></div><div class="loading-text">Laden...</div></div></div>
  </div>

</main>

<script>
  const API = "https://deadlock-api-server-production.up.railway.app";
  let heroesCache = null;
  let heroesLoaded = false;
  let lbLoaded = false;

  // ── PAGE ROUTING ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    event.target.classList.add('active');

    if (name === 'heroes' && !heroesLoaded) { loadHeroes(); heroesLoaded = true; }
    if (name === 'leaderboard' && !lbLoaded) { loadLeaderboard('Europe'); lbLoaded = true; }
  }

  // ── PLAYER SEARCH ──
  async function searchPlayer() {
    const name = document.getElementById('searchInput').value.trim();
    if (!name) return;
    const errEl = document.getElementById('searchError');
    errEl.textContent = '';
    document.getElementById('playerSection').style.display = 'none';
    document.getElementById('searchSection').style.display = 'flex';

    try {
      // Resolve Steam name → ID
      const r = await fetch(`${API}/api/search/${encodeURIComponent(name)}`);
      const json = await r.json();
      if (!json.ok) { errEl.textContent = json.error || 'Spieler nicht gefunden.'; return; }
      const steamId = json.steam_id;
      loadPlayer(steamId, name);
    } catch (e) {
      errEl.textContent = 'Fehler: ' + e.message;
    }
  }

  async function loadPlayer(steamId, displayName) {
    const section = document.getElementById('playerSection');
    section.style.display = 'block';
    section.innerHTML = '<div class="loading"><div class="loading-bar"></div><div class="loading-text">Spieler laden...</div></div>';
    document.getElementById('searchSection').style.display = 'none';

    try {
      const [summaryRes, matchesRes] = await Promise.all([
        fetch(`${API}/api/players/${steamId}`),
        fetch(`${API}/api/players/${steamId}/matches?limit=20`)
      ]);

      const summary = await summaryRes.json();
      const matches = await matchesRes.json();

      renderPlayer(steamId, displayName, summary, matches);
    } catch (e) {
      section.innerHTML = `<div class="error-msg">Fehler beim Laden: ${e.message}</div>`;
    }
  }

  function renderPlayer(steamId, displayName, summary, matchesData) {
    const section = document.getElementById('playerSection');
    const s = summary.ok ? summary.data : null;
    const matchList = matchesData.ok ? (matchesData.data.matches || matchesData.data || []) : [];

    // Stats
    const wins = s?.wins ?? 0;
    const losses = s?.losses ?? 0;
    const total = wins + losses;
    const wr = total > 0 ? ((wins / total) * 100).toFixed(1) : '–';
    const kd = s?.kd_ratio ? s.kd_ratio.toFixed(2) : '–';
    const avgKills = s?.average_kills ? s.average_kills.toFixed(1) : '–';
    const avgDeaths = s?.average_deaths ? s.average_deaths.toFixed(1) : '–';
    const avgAssists = s?.average_assists ? s.average_assists.toFixed(1) : '–';

    const wrColor = parseFloat(wr) >= 55 ? 'good' : parseFloat(wr) < 45 ? 'bad' : 'accent2';

    let html = `
      <div class="profile-header fade-in">
        <div class="profile-avatar">${displayName.charAt(0).toUpperCase()}</div>
        <div class="profile-info">
          <div class="profile-name">${displayName}</div>
          <div class="profile-id">Steam ID: ${steamId}</div>
        </div>
        <button class="back-btn" onclick="goBack()">← Zurück</button>
      </div>

      <div class="stats-grid fade-in">
        <div class="stat-card">
          <div class="stat-value ${wrColor}">${wr}%</div>
          <div class="stat-label">Winrate</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent">${wins}</div>
          <div class="stat-label">Siege</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${losses}</div>
          <div class="stat-label">Niederlagen</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent2">${kd}</div>
          <div class="stat-label">K/D</div>
        </div>
        <div class="stat-card">
          <div class="stat-value good">${avgKills}</div>
          <div class="stat-label">Ø Kills</div>
        </div>
        <div class="stat-card">
          <div class="stat-value bad">${avgDeaths}</div>
          <div class="stat-label">Ø Deaths</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgAssists}</div>
          <div class="stat-label">Ø Assists</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Matches</div>
        </div>
      </div>
    `;

    if (matchList.length > 0) {
      html += `<div class="section-title" style="margin-top:1.5rem;">Match Historie</div>`;
      html += `
        <div class="match-header">
          <span>Ergebnis</span><span>Hero</span><span>K / D / A</span>
          <span>Schaden</span><span>Heilung</span><span style="text-align:right">Dauer</span>
        </div>
        <div class="match-list fade-in">
      `;

      matchList.slice(0, 20).forEach(m => {
        const won = m.won ?? m.match_outcome === 1;
        const hero = m.hero_name || m.hero_id || '–';
        const k = m.kills ?? '–';
        const d = m.deaths ?? '–';
        const a = m.assists ?? '–';
        const dmg = m.net_worth ? `${(m.net_worth/1000).toFixed(1)}k` : '–';
        const heal = m.hero_healing ? `${(m.hero_healing/1000).toFixed(1)}k` : '–';
        const dur = m.match_duration_s
          ? `${Math.floor(m.match_duration_s/60)}:${String(m.match_duration_s%60).padStart(2,'0')}`
          : '–';

        html += `
          <div class="match-row">
            <span class="match-result ${won ? 'win' : 'loss'}">${won ? 'SIEG' : 'NIEDERLAGE'}</span>
            <span class="match-hero">${hero}</span>
            <span class="match-kda">${k} / ${d} / ${a}</span>
            <span class="match-stat">${dmg}</span>
            <span class="match-stat">${heal}</span>
            <span class="match-duration">${dur}</span>
          </div>
        `;
      });

      html += `</div>`;
    } else {
      html += `<div class="error-msg" style="color:var(--muted)">Keine Match-Daten verfügbar.</div>`;
    }

    section.innerHTML = html;
  }

  function goBack() {
    document.getElementById('playerSection').style.display = 'none';
    document.getElementById('searchSection').style.display = 'flex';
    document.getElementById('searchInput').value = '';
  }

  // ── HEROES ──
  async function loadHeroes() {
    try {
      if (!heroesCache) {
        const r = await fetch(`${API}/api/heroes`);
        const json = await r.json();
        heroesCache = json.data.filter(h => h.player_selectable && !h.disabled);
        heroesCache.sort((a, b) => a.name.localeCompare(b.name));
      }

      let html = `<div class="heroes-grid fade-in">`;
      heroesCache.forEach((hero, i) => {
        const img = hero.images?.icon_hero_card_webp || hero.images?.icon_hero_card || '';
        html += `
          <div class="hero-card" style="animation-delay:${i*0.02}s">
            ${img ? `<img src="${img}" alt="${hero.name}" loading="lazy"/>` : ''}
            <div class="hero-overlay"></div>
            <div class="hero-info">
              <div class="hero-name">${hero.name}</div>
              <div class="hero-winrate" style="color:var(--muted);font-size:0.65rem;letter-spacing:0.1em">${hero.hero_type || ''}</div>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      document.getElementById('heroesContent').innerHTML = html;
    } catch (e) {
      document.getElementById('heroesContent').innerHTML = `<div class="error-msg">${e.message}</div>`;
    }
  }

  // ── LEADERBOARD ──
  async function loadLeaderboard(region, btn) {
    if (btn) {
      document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }

    document.getElementById('leaderboardContent').innerHTML =
      '<div class="loading"><div class="loading-bar"></div><div class="loading-text">Laden...</div></div>';

    try {
      const r = await fetch(`${API}/api/leaderboard?region=${region}`);
      const json = await r.json();
      const entries = json.data?.entries || json.data || [];

      if (!entries.length) {
        document.getElementById('leaderboardContent').innerHTML =
          '<div class="error-msg">Keine Daten verfügbar.</div>';
        return;
      }

      let html = `
        <div class="lb-header">
          <span style="text-align:center">#</span>
          <span>Spieler</span>
          <span style="text-align:right">Rank Score</span>
          <span style="text-align:right">Wins</span>
          <span style="text-align:right">Matches</span>
        </div>
        <div class="match-list fade-in">
      `;

      entries.slice(0, 100).forEach((e, i) => {
        const rank = e.rank ?? i + 1;
        const name = e.account_name || e.name || e.steam_id || '–';
        const score = e.ranked_badge_level ?? e.rank_score ?? '–';
        const wins = e.wins ?? '–';
        const total = e.matches ?? '–';

        html += `
          <div class="lb-row">
            <span class="lb-rank ${rank <= 3 ? 'top' : ''}">${rank}</span>
            <span class="lb-name">${name}</span>
            <span class="lb-stat">${score}</span>
            <span class="lb-stat" style="color:var(--green)">${wins}</span>
            <span class="lb-stat" style="color:var(--muted)">${total}</span>
          </div>
        `;
      });

      html += `</div>`;
      document.getElementById('leaderboardContent').innerHTML = html;
    } catch (e) {
      document.getElementById('leaderboardContent').innerHTML = `<div class="error-msg">${e.message}</div>`;
    }
  }
</script>
</body>
</html>
